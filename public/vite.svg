<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="40" fill="#0a0a0a"/>
  <g transform="translate(128, 148)">
    <!-- "drøp" text centered -->
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="800" fill="white" letter-spacing="-4">drøp</text>
  </g>
  <!-- music note stem extending from d -->
  <line x1="68" y1="80" x2="68" y2="52" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- note head -->
  <ellipse cx="60" cy="80" rx="10" ry="7" fill="white" transform="rotate(-15, 60, 80)"/>
  <!-- note flag -->
  <path d="M68 52 C68 52, 80 56, 80 68" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
