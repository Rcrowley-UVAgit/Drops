<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ReVinyl</title>
    <script>
      // SPA redirect for GitHub Pages
      // Strips the base path (/Drops) and passes the rest as a query param
      var basePath = '/Drops';
      var path = window.location.pathname;
      if (path.startsWith(basePath)) {
        path = path.slice(basePath.length) || '/';
      }
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin + basePath + '/?p=' + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
